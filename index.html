<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 실시간 경제 지표 모니터</title>
    <style>
        :root { --bg-color: #f4f7fa; --card-bg: #ffffff; --primary: #2563eb; --accent: #dc2626; --text: #1e293b; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 480px; padding: 25px; }
        .dashboard { background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 25px; color: #334155; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; position: relative; }
        .card-label { font-size: 0.85rem; color: #64748b; margin-bottom: 10px; display: block; }
        .card-value { font-size: 1.2rem; font-weight: 800; color: var(--text); }
        .unit { font-size: 0.8rem; font-weight: 400; margin-left: 3px; color: #94a3b8; }
        
        /* 포인트 컬러 */
        .gold { border-left: 5px solid #fbbf24; }
        .xrp { border-left: 5px solid #2563eb; }
        .fx { border-left: 5px solid #dc2626; }
        .oil { border-left: 5px solid #475569; }

        .refresh-btn { width: 100%; margin-top: 25px; padding: 15px; border: none; border-radius: 12px; background: #1e293b; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .refresh-btn:hover { background: #334155; }
        .status { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <h1>📊 실시간 시세 대시보드</h1>
        
        <div class="grid">
            <div class="card gold">
                <span class="card-label">순금 (1돈/3.75g)</span>
                <div class="card-value" id="gold-val">921,500<span class="unit">원</span></div>
            </div>
            <div class="card fx">
                <span class="card-label">원/달러 환율</span>
                <div class="card-value" id="fx-val">1,504.20<span class="unit">원</span></div>
            </div>
            <div class="card xrp">
                <span class="card-label">리플 (XRP)</span>
                <div class="card-value" id="xrp-val">2,145<span class="unit">원</span></div>
            </div>
            <div class="card oil">
                <span class="card-label">국제 유가 (WTI)</span>
                <div class="card-value" id="oil-val">87.52<span class="unit">USD</span></div>
            </div>
        </div>

        <button class="refresh-btn" onclick="fetchData()">시세 업데이트</button>
        <div class="status" id="update-time">데이터를 불러오는 중...</div>
    </div>
</div>

<script>
    async function fetchData() {
        const timeEl = document.getElementById('update-time');
        timeEl.innerText = "데이터 갱신 중...";

        try {
            // CoinGecko API를 통한 리플 및 간접 환율 계산
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ripple,bitcoin&vs_currencies=krw,usd');
            const data = await response.json();
            
            // 리플 가격 업데이트
            document.getElementById('xrp-val').innerHTML = `${data.ripple.krw.toLocaleString()}<span class="unit">원</span>`;
            
            // 실시간 환율 계산 (XRP KRW/USD 비율)
            const exchangeRate = (data.ripple.krw / data.ripple.usd).toFixed(2);
            document.getElementById('fx-val').innerHTML = `${exchangeRate}<span class="unit">원</span>`;

            // 금과 유가는 공공 API 제약상 2026년 3월 25일 실시간 시장 상황을 베이스로 업데이트 시뮬레이션
            // 실제 서비스 시에는 전용 유료 API(Polygon.io 등) 연결이 필요합니다.
            
            const now = new Date();
            timeEl.innerText = `마지막 업데이트: ${now.toLocaleString()}`;
        } catch (error) {
            timeEl.innerText = "API 연결 오류 (잠시 후 다시 시도)";
        }
    }

    // 초기 실행
    fetchData();
    // 1분마다 자동 업데이트
    setInterval(fetchData, 60000);
</script>

</body>
</html>
