<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安祥道伴 | 실시간 공유 홈페이지</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary-color: #1a3a5f; /* HUFS Navy */
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-red: #dc2626;
            --accent-gold: #fbbf24;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        .container { width: 100%; max-width: 850px; padding: 20px; }
        .main-card { background: var(--card-bg); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }

        /* 프로필 섹션 */
        .profile-header {
            display: flex; align-items: center; padding: 40px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #2c5282 100%);
            color: white; gap: 30px;
        }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.2); object-fit: cover; }
        .profile-text h1 { margin: 0; font-size: 1.8rem; }

        /* 콘텐츠 영역 */
        .content { padding: 40px; }
        .dashboard-title {
            font-size: 1.2rem; margin: 30px 0 20px; color: var(--primary-color);
            display: flex; justify-content: space-between; align-items: center; font-weight: bold;
        }

        /* 경제 지표 그리드 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .card { background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; border-left: 5px solid #cbd5e1; }
        .card-label { font-size: 0.85rem; color: #64748b; margin-bottom: 8px; display: block; }
        .card-value { font-size: 1.2rem; font-weight: 800; }
        .gold { border-left-color: var(--accent-gold); }
        .fx { border-left-color: var(--accent-red); }
        .xrp { border-left-color: var(--primary-color); }

        /* 게시판 스타일 */
        .board-container { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .board-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .board-input-group input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; outline: none; }
        .board-input-group button { padding: 0 20px; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .post-item { 
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; 
            border-left: 4px solid var(--primary-color); display: flex; justify-content: space-between; align-items: center;
        }
        .post-date { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }

        .footer-info { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.9rem; color: #718096; }

        @media (max-width: 600px) { .profile-header { flex-direction: column; text-align: center; } .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="profile-header">
            <img src="me.jpg" alt="Profile" class="profile-img">
            <div class="profile-text">
                <h1>安祥道伴<span style="font-weight:300; font-size:1.1rem;"> Jeon YT</span></h1>
                <p>한국외국어대학교 정보전략팀</p>
                <div style="margin-top:10px; font-size:0.9rem; opacity:0.8;">coffee@hufs.ac.kr | 02.2173.2221</div>
            </div>
        </div>

        <div class="content">
            <div class="dashboard-title">
                <span>📊 실시간 경제 지표</span>
                <button onclick="fetchData()" style="cursor:pointer; border:none; background:none; color:var(--primary-color); font-size:0.8rem; font-weight:bold;">[새로고침]</button>
            </div>
            <div class="grid">
                <div class="card gold"><span class="card-label">순금 (1돈)</span><div class="card-value" id="gold-val">921,500<span style="font-size:0.8rem; font-weight:400; color:#94a3b8;">원</span></div></div>
                <div class="card fx"><span class="card-label">원/달러 환율</span><div class="card-value" id="fx-val">1,504.20<span style="font-size:0.8rem; font-weight:400; color:#94a3b8;">원</span></div></div>
                <div class="card xrp"><span class="card-label">리플 (XRP)</span><div class="card-value" id="xrp-val">2,145<span style="font-size:0.8rem; font-weight:400; color:#94a3b8;">원</span></div></div>
                <div class="card oil"><span class="card-label">국제 유가 (WTI)</span><div class="card-value" id="oil-val">87.52<span style="font-size:0.8rem; font-weight:400; color:#94a3b8;">USD</span></div></div>
            </div>
            <div id="update-time" style="text-align:right; font-size:0.75rem; color:#94a3b8; margin-top:10px;">데이터 로딩 중...</div>

            <div class="dashboard-title"><span>💬 실시간 방명록 (Firebase)</span></div>
            <div class="board-container">
                <div class="board-input-group">
                    <input type="text" id="board-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) addPost()">
                    <button onclick="addPost()">등록</button>
                </div>
                <div id="board-list">데이터를 불러오는 중...</div>
            </div>

            <div class="dashboard-title" style="justify-content: center; margin-top: 50px; opacity: 0.7;">
                <span style="font-size: 0.9rem; font-weight: normal; letter-spacing: 1px;">揭諦揭諦 波羅揭諦 波羅僧揭諦 菩提 娑婆訶</span>
            </div>

            <div class="footer-info"><span>한국외국어대학교 정보전략팀</span><span>© 2026 安祥</span></div>
        </div>
    </div>
</div>

<script>
    /** 1. FIREBASE 설정 (중요: 본인의 설정값으로 반드시 변경하세요) **/
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };
    
    // 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /** 2. 게시판 기능 (실시간 동기화) **/
    function loadPosts() {
        db.ref('messages').on('value', (snapshot) => {
            const data = snapshot.val();
            const listEl = document.getElementById('board-list');
            
            if (!data) {
                listEl.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">첫 글을 남겨보세요!</div>';
                return;
            }

            const posts = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            listEl.innerHTML = posts.map(post => `
                <div class="post-item">
                    <div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-date">${post.date}</div>
                    </div>
                    <button onclick="deletePost('${post.id}')" style="border:none; background:none; color:#cbd5e1; cursor:pointer;">삭제</button>
                </div>
            `).reverse().join('');
        });
    }

    function addPost() {
        const input = document.getElementById('board-input');
        if (!input.value.trim()) return;

        db.ref('messages').push({
            content: input.value,
            date: new Date().toLocaleString()
        });
        input.value = '';
    }

    function deletePost(id) {
        if(confirm("글을 삭제할까요?")) db.ref('messages/' + id).remove();
    }

    /** 3. 경제 지표 기능 **/
    async function fetchData() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ripple&vs_currencies=krw,usd');
            const data = await res.json();
            document.getElementById('xrp-val').innerHTML = `${data.ripple.krw.toLocaleString()}<span style="font-size:0.8rem; font-weight:400; color:#94a3b8; margin-left:3px;">원</span>`;
            document.getElementById('update-time').innerText = `마지막 업데이트: ${new Date().toLocaleTimeString()}`;
        } catch (e) { document.getElementById('update-time').innerText = "연결 오류"; }
    }

    // 실행
    loadPosts();
    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
