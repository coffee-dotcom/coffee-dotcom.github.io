<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>누구게? (Guess who?) | 개인 홈페이지</title>
    <style>
        :root {
            --primary-color: #1a3a5f; /* HUFS Navy */
            --bg-color: #f4f6f9;    /* Light Grayish Blue */
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        /* 메인 카드 스타일 */
        .main-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }

        /* 상단 프로필 영역 */
        .profile-header {
            display: flex;
            align-items: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #2c5282 100%);
            color: white;
            gap: 30px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.2);
            object-fit: cover;
        }

        .profile-text h1 { margin: 0; font-size: 2rem; }
        .profile-text p { margin: 5px 0 0; opacity: 0.9; font-size: 1.1rem; }

        /* 정보 및 관심사 영역 */
        .content {
            padding: 40px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .info-label {
            display: block;
            font-size: 0.85rem;
            color: #718096;
            margin-bottom: 5px;
        }

        .info-value {
            font-weight: 600;
            color: var(--primary-color);
        }

        /* 관심사 태그 스타일 */
        .interest-section h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: #edf2f7;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }

        .tag.highlight {
            background: #ebf8ff;
            color: #3182ce;
            border-color: #bee3f8;
        }

        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: #a0aec0;
        }

        @media (max-width: 600px) {
            .profile-header { flex-direction: column; text-align: center; padding: 30px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="profile-header">
            <img src="지브리_나.jpg" alt="누구게? 프로필" class="profile-img">
            <div class="profile-text">
                <h1>누구게? <span style="font-weight:300; font-size:1.2rem;">Jeon Youngtae</span></h1>
                <p>한국외국어대학교 정보전략팀</p>
            </div>
        </div>

        <div class="content">
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">생년월일</span>
                    <span class="info-value">1968.07.14</span>
                </div>
                <div class="info-item">
                    <span class="info-label">이메일</span>
                    <span class="info-value"><a href="mailto:coffee@hufs.ac.kr" style="text-decoration:none; color:inherit;">coffee@hufs.ac.kr</a></span>
                </div>
            </div>

            <div class="interest-section">
                <h2>관심 분야</h2>
                <div class="tags">
                    <div class="tag highlight">코인 (리플/XRP)</div>
                    <div class="tag">금리 분석</div>
                    <div class="tag">환율 변동</div>
                    <div class="tag">금 시세</div>
                    <div class="tag">정보화 전략</div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        © 2026 Guess Who | Powered by HUFS Information Strategy Team
    </footer>
</div>

</body>
</html>
