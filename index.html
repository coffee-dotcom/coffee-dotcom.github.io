
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeon YoungTae) | 개인 홈페이지</title>
    <style>
        :root {
            --primary-color: #1a3a5f; /* HUFS Navy */
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-red: #dc2626;
            --accent-gold: #fbbf24;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
            padding: 20px;
        }

        .main-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* 상단 프로필 영역 */
        .profile-header {
            display: flex;
            align-items: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #2c5282 100%);
            color: white;
            gap: 30px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.2);
            object-fit: cover;
        }

        .profile-text h1 { margin: 0; font-size: 1.8rem; }
        .profile-text p { margin: 5px 0 0; opacity: 0.9; font-size: 1.1rem; }

        /* 대시보드 영역 (기존 관심분야 자리) */
        .content { padding: 40px; }
        
        .dashboard-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }
        
        .card:hover { transform: translateY(-3px); }
        .card-label { font-size: 0.85rem; color: #64748b; margin-bottom: 8px; display: block; }
        .card-value { font-size: 1.2rem; font-weight: 800; color: var(--text-color); }
        .unit { font-size: 0.8rem; font-weight: 400; margin-left: 3px; color: #94a3b8; }

        /* 포인트 컬러 (jyt.html 컨셉 유지) */
        .gold { border-left: 5px solid var(--accent-gold); }
        .xrp { border-left: 5px solid var(--primary-color); }
        .fx { border-left: 5px solid var(--accent-red); }
        .oil { border-left: 5px solid #475569; }

        .status {
            text-align: right;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 15px;
        }

        /* 하단 정보 섹션 */
        .footer-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #718096;
        }

        @media (max-width: 600px) {
            .profile-header { flex-direction: column; text-align: center; }
            .grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="profile-header">
            <img src="me.jpg" alt="나의 프로필" class="profile-img">
            <div class="profile-text">
                <h1>安祥道伴<span style="font-weight:300; font-size:1.1rem;">Jeon ToungTae</span></h1>
                <p>한국외국어대학교 정보전략팀</p>
                <div style="margin-top:10px; font-size:0.9rem; opacity:0.8;">
                    coffee@hufs.ac.kr | https://coffee.hufs.ac.kr
                </div>
            </div>
        </div>

        <div class="content">
            <div class="dashboard-title">
                <span>📊 실시간 경제 지표</span>
                <button onclick="fetchData()" style="cursor:pointer; border:none; background:none; color:var(--primary-color); font-size:0.8rem;">[새로고침]</button>
            </div>
            
            <div class="grid">
                <div class="card gold">
                    <span class="card-label">순금 (1돈)</span>
                    <div class="card-value" id="gold-val">921,500<span class="unit">원</span></div>
                </div>
                <div class="card fx">
                    <span class="card-label">원/달러 환율</span>
                    <div class="card-value" id="fx-val">1,504.20<span class="unit">원</span></div>
                </div>
                <div class="card xrp">
                    <span class="card-label">리플 (XRP)</span>
                    <div class="card-value" id="xrp-val">2,145<span class="unit">원</span></div>
                </div>
                <div class="card oil">
                    <span class="card-label">국제 유가 (WTI)</span>
                    <div class="card-value" id="oil-val">87.52<span class="unit">USD</span></div>
                </div>
            </div>
            <div class="status" id="update-time">데이터 로딩 중...</div>

            <div class="footer-info">
                <span>한국외국어대학교 정보처 정보전략팀</span>
                <span>© 2026 Jeon YoungTae</span>
            </div>
        </div>
    </div>
</div>

<script>
    async function fetchData() {
        const timeEl = document.getElementById('update-time');
        timeEl.innerText = "갱신 중...";

        try {
            // CoinGecko API 활용 (리플 가격 및 환율)
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ripple&vs_currencies=krw,usd');
            const data = await response.json();
            
            // 리플 KRW 가격
            const xrpKrw = data.ripple.krw;
            document.getElementById('xrp-val').innerHTML = `${xrpKrw.toLocaleString()}<span class="unit">원</span>`;
            
            // 실시간 환율 추정 (KRW/USD)
            const exchangeRate = (data.ripple.krw / data.ripple.usd).toFixed(2);
            document.getElementById('fx-val').innerHTML = `${Number(exchangeRate).toLocaleString()}<span class="unit">원</span>`;

            // 금/유가 업데이트 (시뮬레이션 유지)
            const now = new Date();
            timeEl.innerText = `마지막 업데이트: ${now.toLocaleTimeString()}`;
        } catch (error) {
            timeEl.innerText = "API 연결 일시 오류";
        }
    }

    // 초기 실행 및 1분 간격 업데이트
    fetchData();
    setInterval(fetchData, 60000);
</script>

</body>
</html>
</body>
</html>
